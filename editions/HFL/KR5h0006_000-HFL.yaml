body:
  text: 太上老君開天經蓋聞未有天地之間太清之外不可稱計虛無之裏寂寞無表無天無地無陰無陽無日無月無晶無光無東無西無青無黄無南無北無柔無剛無覆無載無壞無藏無賢無聖無忠無良無去無來無生無亡無前無後無圓無方百億變化浩浩蕩蕩無形無象自然空玄窮之難極無量無邊無高無下無等無徧無左無右高下自然唯吾老君猶處空玄寂寥之外玄虛之中視之不見聽之不聞若言有不見其形若言無萬物從之而生八表之外漸漸始分下成微妙以爲世界而有洪元洪元之時亦未有天地虛空未分清濁未判玄虛寂寥之裏洪元一治至於萬劫洪元旣判而有混元混元一治萬刼至于百成百成亦八十一萬年而有太初太初之時老君從虛空而下爲太初之師口吐開天經一部四十八萬卷一卷有四十八萬字一字𨐓方一百里以教太初太初始分别天地清濁剖判溟涬洪濛置立形象安竪南北制正東西開闇顯明光格四維上下内外表裏長短粗細雌雄白黑大小尊卑常如夜行太𥘉得此老君開天之經清濁已分清氣上昇爲天濁氣下沉爲地三綱旣分從此始有天地猶未有日月天欲化物無方可變便乃置生日月在其中下照闇𡨋太𥘉時雖有日月未有人民漸始初生上取天精下取地精中間和合以成一神名曰人也天地旣空三分始有生生之類無形之象各受一氣而生或有朴氣而生者山石是也動氣而生者飛走是也精氣而生者人是也萬物之中人最爲貴太𥘉一治至于萬劫人民之初故曰太𥘉是時唯有天地日月人民都未有識名太初旣没而有太始太始之時老君下爲師口吐太始經一部教其太始置立天下九十一刼九十一刼者至于百成百成者亦八十一萬年太始者萬物之始也故曰太始流轉成練素象於中而見氣實自變得成陰陽太始旣没而有太素太素之時老君下降爲師教示太素以法天下八十一刼至于百成亦八十一萬年太素者萬物之素故曰太素太已下太素已來天生甘露地生醴泉人民食之乃得長生死不知葬埋棄屍於逺野名曰上古太素旣没而有混沌混沌之時始有山川老君下爲師教示混沌以治天下七十二刼混沌流行成其山川五嶽四瀆高下尊卑乃其始起也混沌已來始有識名混沌號生二子大者胡臣小者胡靈胡臣死爲山嶽神靈死爲水神因即名爲五嶽四瀆山川高下混沌旣没而九宫九宫之時老君下爲師口吐乾坤經一部結其九宫識名天地清氣爲天濁氣爲地從九宫已來天是陽地是陰陽者剛强遠視難覩在天成象日月星辰是也在地成形五嶽四瀆是也在人成生心肝五臟是也分别名之有異惣而名之是一也九宫没後而有元皇元皇之時老君下爲師口吐元皇經一部教元皇治於天下始有皇化通流後代以漸成之元皇之後次有太上皇太上皇之時老君下爲師教示太上皇以治天下太上皇之後而有地皇地皇之後而有人皇人皇之後而有尊盧尊盧之後而有句婁句婁之後而有赫胥赫胥之後而有太連太連已前混沌已來名曰中古尒時天生五炁地生五味人民食之乃得延年太連之後而有伏義生於一源之始繼天而生調習陰陽以定八卦自伏羲已前五經不載書文不達唯有老君從天虛空無億河沙在太清之外不可稱計大道旣分天地已來開置皇化轉佐天帝通流後世以自記之伏羲之時老君下爲師號曰無化子一名鬱華子教示伏義推舊法演陰陽正八方定八卦作元陽經以教伏羲以前未有姓字直有其名尒時人民朴直未有五穀伏義乃教以張羅網捕禽獸而食之皆衣毛茹血腥臊臭穢男女無别不相嫉妬冬則穴處夏則巢居伏義没後而有女媧女媧殁後而有神農神農之時老君下爲師號曰大成子作太㣲經教神農𣈆百草得五穀與人民播植遂食之以代禽獸之命也神農没後而有燧人燧人時老君下爲師教示燧人鑚木出火續日之光變生爲熟以除腥臊燧人没後而有祝融祝融之時老君下爲師號廣壽子教修三綱齊七政三皇修道人皆不病作按摩通精經次有高原高陽高辛三世次有蒼頡仲說教書學文三皇之後而有軒轅黄帝黄帝之時老君下爲師號曰廣成子消息陰陽作道戒經道經黄帝以來始有君臣父子尊卑以别貴賤有殊黄帝之後次有少昊少昊之時老君下爲師號曰隨應子作玄蔵經尒時昇平嘉禾生醴泉出麒麟至鳳凰來景星照少昊之後次有帝顓頊顓頊之時老君下爲師號曰赤精子作㣲言經顓頊没後而有帝嚳帝嚳之後而有帝堯帝堯之時老君下爲師號曰務成子作政事經帝堯之後而有帝舜帝舜之時老君下爲師號曰尹壽子作太清經帝舜之後而有夏禹夏禹之時老君下爲師號曰真行子作德誡經夏禹之後而有殷湯殷湯之後而至周初周初時老君下爲師號曰燮邑子作赤精經老君曰秘化之初吾體虛無經歷無窮千變萬化先下爲師三皇已前爲神化之本吾後化三皇五帝爲師并及三王皆勸令修善天一地二人三時四音五律六星七風八州九合有四十五子卯酉中央各有九䇲戴九履一左三右七二四爲肩六八爲足中有五龜體成八卦水流歸末分八至丑葉落歸本分六至亥金剛本强分二至未土王四季分四至巳坎怨獨走離明數四艮八高槮三從坤位乾當城坤與一相逐巽吁天門從乾貸一震雷動澤從兌所减辰午酉亥自形之卦各内其八卦以成餘有九筭成易字老君即演行期術曰行期之法自有術先舉坎就坤二西南王母東青龍習氣發裔地户間巽上四期入中宫筭出中宫昇於乾西之大澤華山顛東北之上寅艮間南之炎火离霍山番然變化北入玄太上老君開天經終
